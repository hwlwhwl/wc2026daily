        <tbody>${rows}</tbody>
      </table>
    </div>
    <style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}</style>`;
}

function setLbSort(key){
  if(S.lbSort===key){
    S.lbSortDir = -S.lbSortDir;
  } else {
    S.lbSort = key;
    // 'bad' (goal error) is lower-better, so default ascending; everything else descending
    S.lbSortDir = key==='bad' ? 1 : -1;
  }
  render();
}

function renderCompare(){
  const completed=GROUP_GAMES.filter(g=>S.gResults[g.id]);
  const allPred=[];
  if(S.name&&Object.keys(S.gPreds).length>0) allPred.push({name:S.name+' (you)',gPreds:S.gPreds});
  allPred.push(...S.imported);

  const W=getWeights();
  const lb=allPred.map(p=>{
    let total=0,exact=0,correct=0,scored=0,bad=0;
    for(const [gid,pr] of Object.entries(p.gPreds)){
      const r=S.gResults[gid]; if(!r) continue;
      scored++;
      const p2=pts(pr[0],pr[1],r[0],r[1]);
      total+=p2; if(p2===3)exact++; if(p2>=1)correct++;
      bad+=Math.abs(pr[0]-r[0])+Math.abs(pr[1]-r[1]);
    }
    const weighted=scored>0?+(W.a*correct+W.b*exact-W.c*bad).toFixed(2):null;
    return {name:p.name,total,exact,correct,scored,bad,weighted,predCount:Object.keys(p.gPreds).length};
  }).sort((a,b)=>{
    const key=S.lbSort, dir=S.lbSortDir;
    const av=a[key]??-Infinity, bv=b[key]??-Infinity;
    return (av-bv)*dir || b.total-a.total || b.exact-a.exact;
  });

  const maxPts=lb[0]?.total||0;
  const MEDALS=['🥇','🥈','🥉'];

  // Chart time series — one point per completed game in date order
  const sortedCompleted=[...completed].sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
  const chartSeries=allPred.map(p=>{
    let cc=0,cb=0;
    const correctPts=[0],badPts=[0];
    for(const game of sortedCompleted){
      const r=S.gResults[game.id], pr=p.gPreds[game.id];
      if(pr&&r){ const sc=pts(pr[0],pr[1],r[0],r[1]); if(sc>=1)cc++; cb+=Math.abs(pr[0]-r[0])+Math.abs(pr[1]-r[1]); }
      correctPts.push(cc); badPts.push(cb);
    }
    return {name:p.name,correctPts,badPts};
  });

  // Sort indicator helper
  const sortInd = key => S.lbSort===key ? (S.lbSortDir===-1?' ▼':' ▲') : '';
  const thSort = (key, label, tip='') => {
    const active = S.lbSort===key;
    return `<th onclick="setLbSort('${key}')" title="${tip}" style="padding:0.75rem 1rem;text-align:right;cursor:pointer;user-select:none;white-space:nowrap;${active?'color:#4ade80;':''}">
      ${label}${sortInd(key)}</th>`;
  };

  const lbHTML=lb.length===0
    ?`<div style="text-align:center;padding:3rem 1rem;color:#64748b;">No predictions loaded. <button onclick="showView('predict')" style="background:none;border:none;color:#4ade80;cursor:pointer;">Make yours →</button></div>`
    :`<table style="width:100%;border-collapse:collapse;font-size:0.875rem;">
      <thead><tr style="color:#64748b;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid rgba(255,255,255,0.08);">
        <th style="padding:0.75rem 1rem;text-align:left;width:2rem;">#</th>
        <th style="padding:0.75rem 1rem;text-align:left;">Name</th>
        ${thSort('total',   'Pts',     'Total prediction points')}
        ${thSort('exact',   'Exact',   'Number of exact scores predicted')}
        ${thSort('correct', 'Result✓', 'Games where W/D/L result was correct')}
        ${thSort('scored',  'Scored',  'Number of games predicted')}
        ${thSort('bad',     'Points↓', 'Total goal error vs actual scores — lower is better')}
      </tr></thead>
      <tbody>${lb.map((e,i)=>{
        // Find avatar for this entry
        const imp=S.imported.find(x=>x.name===e.name||(x.name+' (you)')===e.name);
        const isSelf=(e.name===S.name+' (you)');
        const avatarSrc=isSelf?S.avatar:(imp?.avatar||'');
        const avatarHTML=avatarSrc
          ?`<img src="${avatarSrc}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;margin-right:0.4rem;box-shadow:0 2px 8px rgba(0,0,0,0.55),0 0 0 1.5px rgba(255,255,255,0.12);" />`
          :`<span style="width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.07);display:inline-flex;align-items:center;justify-content:center;font-size:0.75rem;flex-shrink:0;margin-right:0.4rem;box-shadow:0 2px 8px rgba(0,0,0,0.4);">🧑</span>`;
        return `
        <tr style="border-bottom:1px solid rgba(255,255,255,0.04);">
          <td style="padding:0.75rem 1rem;">${i<3?MEDALS[i]:i+1}</td>
          <td style="padding:0.75rem 1rem;">
            <div style="display:flex;align-items:center;font-weight:500;color:white;">${avatarHTML}${esc(e.name)}</div>
            ${maxPts>0?`<div style="margin-top:3px;height:3px;background:rgba(255,255,255,0.08);border-radius:9999px;width:7rem;overflow:hidden;"><div style="height:100%;background:#16a34a;width:${(e.total/maxPts*100).toFixed(1)}%;"></div></div>`:''}
          </td>
          <td style="padding:0.75rem 1rem;text-align:right;font-weight:700;color:#fcd34d;font-size:1rem;">${e.total}</td>
          <td style="padding:0.75rem 1rem;text-align:right;color:#4ade80;">${e.exact}</td>
          <td style="padding:0.75rem 1rem;text-align:right;color:#facc15;">${e.correct}</td>
          <td style="padding:0.75rem 1rem;text-align:right;color:#64748b;">${e.scored}</td>
          <td style="padding:0.75rem 1rem;text-align:right;color:#f87171;font-weight:600;">${e.scored>0?e.bad:'–'}</td>
        </tr>`;}).join('')}
      </tbody></table>`;


  const resultCards=completed.map(game=>{
    const [rh,ra]=S.gResults[game.id];
    const gamePreds=allPred.map(p=>{
      const pr=p.gPreds[game.id]; if(!pr) return null;
      const [ph,pa]=pr;
      return {name:p.name,ph,pa,p:pts(ph,pa,rh,ra),bad:Math.abs(ph-rh)+Math.abs(pa-ra)};
    }).filter(Boolean).sort((a,b)=>b.p-a.p);
    return `
      <div style="background:#112a45;border:1px solid rgba(255,255,255,0.07);border-radius:0.75rem;overflow:hidden;margin-bottom:0.625rem;">
        <div style="display:flex;align-items:center;gap:0.75rem;padding:0.625rem 1rem;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(10,22,40,0.5);flex-wrap:wrap;">
          <span style="font-size:0.7rem;color:#64748b;background:rgba(255,255,255,0.05);padding:0.1rem 0.4rem;border-radius:0.25rem;white-space:nowrap;">Group ${game.g} MD${game.md}</span>
          <div style="flex:1;display:flex;align-items:center;justify-content:center;gap:0.625rem;font-weight:600;flex-wrap:wrap;">
            <span>${flag(game.home)} ${game.home}</span>
            <span style="font-size:1.25rem;font-weight:700;color:#fcd34d;">${rh}–${ra}</span>
            <span>${game.away} ${flag(game.away)}</span>
          </div>
          <span style="font-size:0.7rem;color:#475569;">${game.date}</span>
        </div>
        ${gamePreds.length===0?'<div style="padding:0.625rem 1rem;font-size:0.8rem;color:#64748b;">No predictions</div>':
          gamePreds.map(p=>`
            <div style="display:flex;align-items:center;gap:0.625rem;padding:0.5rem 1rem;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.8rem;">
              <span style="color:#cbd5e1;font-weight:500;width:8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(p.name)}</span>
              <span style="color:#94a3b8;font-variant-numeric:tabular-nums;">${p.ph}–${p.pa}</span>
              <div style="margin-left:auto;display:flex;align-items:center;gap:0.4rem;">
                ${p.p===3?'<span class="pts-exact">Exact</span>':p.p===1?'<span class="pts-res">Result✓</span>':'<span class="pts-no">Wrong</span>'}
                <span style="font-weight:700;${p.p===3?'color:#4ade80':p.p===1?'color:#facc15':'color:#334155'}">+${p.p}</span>
                <span style="color:#f87171;font-size:0.7rem;font-weight:600;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);padding:0.1rem 0.3rem;border-radius:0.25rem;" title="Total goal error vs actual scores — lower is better">Pts err ${p.bad}</span>
              </div>
            </div>`).join('')}
      </div>`;
  }).join('');

  return `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:0.5rem;">
      <div>
        <h1 style="font-size:1.75rem;font-weight:700;color:white;margin-bottom:0.25rem;">Leaderboard</h1>
        <p style="color:#64748b;font-size:0.875rem;">${completed.length} of ${GROUP_GAMES.length} group games with results</p>
      </div>
      <button id="hub-sync-btn" onclick="syncFromHub()" class="btn-s" style="font-size:0.8rem;padding:0.4rem 0.875rem;white-space:nowrap;">${isLocked()&&localStorage.getItem(FINAL_SYNC_KEY)?'✓ Picks cached':'🔄 Sync from hub'}</button>
    </div>

    <div style="background:#112a45;border:1px solid rgba(255,255,255,0.07);border-radius:0.75rem;padding:1rem;margin-bottom:1.25rem;">
      <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:#64748b;margin-bottom:0.375rem;">
        <span>Tournament progress</span><span>${completed.length}/${GROUP_GAMES.length}</span>
      </div>
      <div style="height:0.5rem;background:rgba(255,255,255,0.07);border-radius:9999px;overflow:hidden;">
        <div style="height:100%;background:#16a34a;border-radius:9999px;width:${(completed.length/GROUP_GAMES.length*100).toFixed(1)}%;"></div>
      </div>
    </div>

    ${lb.length>0&&completed.length>0?(()=>{
      const leader=(arr,key,low)=>{
        const scored=arr.filter(e=>e.scored>0);
        if(!scored.length) return null;
        const best=low?Math.min(...scored.map(e=>e[key])):Math.max(...scored.map(e=>e[key]));
        const winners=scored.filter(e=>e[key]===best);
        return {name:winners.map(e=>esc(e.name)).join(', '),val:best,tied:winners.length>1};
      };
      const wLeader=(arr)=>{
        const scored=arr.filter(e=>e.scored>0&&e.weighted!==null);
        if(!scored.length) return null;
        const best=Math.max(...scored.map(e=>e.weighted));
        const winners=scored.filter(e=>e.weighted===best);
        return {name:winners.map(e=>esc(e.name)).join(', '),val:best,tied:winners.length>1};
      };
      const boxes=[
        {icon:'✓', label:'Most correct',    accent:'#4ade80', r:leader(lb,'correct',false), fmt:v=>`${v}`},
        {icon:'🎯', label:'Most exact',     accent:'#fcd34d', r:leader(lb,'exact',false),   fmt:v=>`${v}`},
        {icon:'📉', label:'Points are Bad',   accent:'#a78bfa', r:leader(lb,'bad',true),      fmt:v=>`${v}`},
        {icon:'⚖️', label:'Weighted score', accent:'#38bdf8', r:wLeader(lb),                fmt:v=>`${v}`,
          sub:`${W.a}×correct + ${W.b}×exact − ${W.c}×PAB`},
      ];
      return `<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:0.625rem;margin-bottom:1.25rem;">
        ${boxes.map(b=>{
          const noData=!b.r||b.r.val===null;
          return `<div style="background:#112a45;border:1px solid ${noData?'rgba(255,255,255,0.07)':b.accent+'33'};border-radius:0.75rem;padding:0.75rem;min-width:0;">
            <div style="font-size:1rem;margin-bottom:0.25rem;">${b.icon}</div>
            <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:#64748b;margin-bottom:0.375rem;">${b.label}</div>
            ${noData
              ? `<div style="font-size:0.8rem;color:#334155;">–</div>`
              : `<div style="font-size:0.85rem;font-weight:700;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${b.r.name}">${b.r.name}</div>
                 <div style="font-size:1.1rem;font-weight:800;color:${b.accent};margin-top:0.125rem;">${b.fmt(b.r.val)}</div>
                 ${b.r.tied?`<div style="font-size:0.6rem;color:#64748b;margin-top:0.125rem;">tied</div>`:''}`}
            ${b.sub?`<div style="font-size:0.6rem;color:#475569;margin-top:0.375rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${b.sub}</div>`:''}
          </div>`;
        }).join('')}
      </div>`;
    })():''}

    ${completed.length>0&&chartSeries.length>0?`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;">
      <div style="background:#112a45;border:1px solid rgba(255,255,255,0.07);border-radius:0.75rem;padding:0.75rem;">
        <div style="font-size:0.72rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:0.375rem;">Correct guesses</div>
        ${makeLineChart(chartSeries.map(s=>({name:s.name,pts:s.correctPts})),false)}
      </div>
      <div style="background:#112a45;border:1px solid rgba(255,255,255,0.07);border-radius:0.75rem;padding:0.75rem;">
        <div style="font-size:0.72rem;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:0.375rem;">Points are Bad</div>
        ${makeLineChart(chartSeries.map(s=>({name:s.name,pts:s.badPts})),true)}
      </div>
    </div>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-bottom:1.25rem;padding:0 0.25rem;">
      ${chartSeries.map((s,i)=>`<span style="font-size:0.72rem;color:#94a3b8;white-space:nowrap;"><span style="color:${CHART_COLORS[i%CHART_COLORS.length]};">●</span> ${esc(s.name)}</span>`).join('')}
    </div>`:''}

    <div style="background:#112a45;border:1px solid rgba(255,255,255,0.07);border-radius:0.75rem;overflow:hidden;margin-bottom:1.25rem;">${lbHTML}</div>

    ${completed.length>0?`<h2 style="font-size:1.125rem;font-weight:700;color:white;margin-bottom:0.75rem;">Game breakdown</h2>${resultCards}`
      :`<div style="text-align:center;padding:2.5rem;color:#64748b;background:#112a45;border:1px solid rgba(255,255,255,0.07);border-radius:0.75rem;">⏳ Game results appear here once entered in Admin.</div>`}
  `;
}

// ═══════════════════════════════════════════════════════════
// ADMIN VIEW
// ═══════════════════════════════════════════════════════════
function renderAdmin(){
  if(!S.adminUnlocked) return `
    <div style="max-width:22rem;margin:5rem auto 0;text-align:center;">
      <div style="font-size:2.5rem;margin-bottom:0.75rem;">🔐</div>
      <h1 style="font-size:1.5rem;font-weight:700;color:white;margin-bottom:0.5rem;">Admin access</h1>
      <p style="color:#94a3b8;font-size:0.875rem;margin-bottom:1.5rem;">Enter the password to manage match results.</p>
      <input class="text-in" type="password" id="pass-in" placeholder="Password"
        onkeydown="if(event.key==='Enter')checkPass()" style="margin-bottom:0.75rem;" />
      <button class="btn-g" onclick="checkPass()" style="width:100%;">Unlock</button>
      <p style="color:#334155;font-size:0.75rem;margin-top:0.75rem;">Default: <code>wc2026</code></p>
    </div>`;

  const done=Object.keys(S.gResults).length;
  const grpKeys=Object.keys(GROUPS);
  const grpTabs=grpKeys.map(g=>{
    const total=GROUP_GAMES.filter(x=>x.g===g).length;
    const cnt=GROUP_GAMES.filter(x=>x.g===g&&S.gResults[x.id]).length;
    const cls=g===S.adminGroup?'rnd-tab on':cnt===total?'rnd-tab done':'rnd-tab';
    return `<button class="${cls}" onclick="S.adminGroup='${g}';render()">${cnt===total?'✓ ':''}${g}</button>`;
  }).join('');

  const games=GROUP_GAMES.filter(x=>x.g===S.adminGroup);
  const gameRows=games.map(game=>{
    const r=S.gResults[game.id];
    const rh=r!=null?r[0]:'', ra=r!=null?r[1]:'';
    return `
      <div style="background:#0a1628;border:1px solid ${r?'rgba(22,163,74,0.35)':'rgba(255,255,255,0.08)'};border-radius:0.75rem;padding:1rem;margin-bottom:0.625rem;">
        <div style="font-size:0.75rem;color:#64748b;margin-bottom:0.75rem;">
          MD${game.md} · ${game.date} ${r?'<span style="color:#4ade80;margin-left:0.5rem;">✓</span>':''}
        </div>
        <div style="display:flex;align-items:center;gap:0.75rem;">
          <div style="flex:1;text-align:right;font-weight:500;font-size:0.875rem;">${flag(game.home)} ${game.home}</div>
          <div style="display:flex;align-items:center;gap:0.5rem;">
            <input class="score-in" type="number" min="0" max="20" value="${rh}" placeholder="–" id="rh-${game.id}" style="width:3rem;" />
            <span style="color:#475569;font-weight:700;">–</span>
            <input class="score-in" type="number" min="0" max="20" value="${ra}" placeholder="–" id="ra-${game.id}" style="width:3rem;" />
          </div>
          <div style="flex:1;text-align:left;font-weight:500;font-size:0.875rem;">${game.away} ${flag(game.away)}</div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:0.5rem;margin-top:0.75rem;">
          ${r?`<button onclick="delGResult(${game.id})" style="font-size:0.75rem;color:#f87171;background:rgba(153,27,27,0.2);border:1px solid rgba(153,27,27,0.3);border-radius:0.375rem;padding:0.375rem 0.75rem;cursor:pointer;">Remove</button>`:''}
          <button onclick="saveGResult(${game.id})" style="font-size:0.75rem;background:#15803d;color:white;border:none;border-radius:0.375rem;padding:0.375rem 0.875rem;cursor:pointer;font-weight:500;">Save</button>
        </div>
      </div>`;
  }).join('');

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;">
      <div>
        <h1 style="font-size:1.5rem;font-weight:700;color:white;">Admin — Results</h1>
        <p style="color:#64748b;font-size:0.875rem;">${done}/${GROUP_GAMES.length} group results entered</p>
      </div>
      <button class="btn-s" onclick="copyResults()" style="font-size:0.875rem;padding:0.5rem 1rem;">📋 Export results</button>
    </div>

    <!-- Hub connection -->
    <div style="background:#112a45;border:1px solid rgba(255,255,255,0.07);border-radius:0.75rem;padding:1rem;margin-bottom:1rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-wrap:wrap;margin-bottom:0.625rem;">
        <div>
          <h2 style="font-weight:600;color:white;margin-bottom:0.15rem;font-size:0.95rem;">☁️ Pantry Cloud hub</h2>
          <p style="color:#64748b;font-size:0.78rem;margin:0;">Shared storage for predictions and results — no setup required.</p>
        </div>
        <button id="hub-push-btn" onclick="pushResultsToHub()" class="btn-g" style="font-size:0.8rem;padding:0.4rem 0.875rem;white-space:nowrap;">Push results to hub</button>
      </div>
      <div style="background:#0a1628;border:1px solid rgba(74,222,128,0.2);border-radius:0.5rem;padding:0.5rem 0.875rem;display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
        <span style="font-family:monospace;font-size:0.75rem;color:#4ade80;">✓ Connected · pantry/${PANTRY_ID.slice(0,8)}…</span>
      </div>
    </div>

    <!-- ESPN live scores -->
    <div style="background:#112a45;border:1px solid rgba(255,255,255,0.07);border-radius:0.75rem;padding:1rem;margin-bottom:1rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:0.5rem;flex-wrap:wrap;">
        <div>
          <h2 style="font-weight:600;color:white;margin-bottom:0.2rem;font-size:0.95rem;">📡 ESPN live scores</h2>
          <p style="color:#64748b;font-size:0.78rem;margin:0;">Fetches completed WC results automatically. No API key required.</p>
        </div>
        <button class="btn-g" id="fetch-btn" onclick="fetchLiveScores()" style="font-size:0.875rem;padding:0.5rem 1rem;white-space:nowrap;">🔄 Fetch scores</button>
      </div>
      ${(()=>{ const t=localStorage.getItem('wc26_espn_fetched'); return t?`<p style="font-size:0.72rem;color:#475569;margin-top:0.5rem;margin-bottom:0;">Last fetched: ${new Date(t).toLocaleString()}</p>`:''; })()}
    </div>

    <!-- Manual score entry accordion -->
    <details style="margin-bottom:1rem;">
      <summary style="cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;background:#112a45;border:1px solid rgba(255,255,255,0.07);border-radius:0.75rem;padding:0.875rem 1rem;color:white;font-weight:600;font-size:0.95rem;user-select:none;" onclick="">
        <span>✏️ Enter scores manually</span>
        <span style="font-size:0.75rem;color:#64748b;font-weight:400;">${done}/${GROUP_GAMES.length} entered · click to expand</span>
      </summary>
      <div style="border:1px solid rgba(255,255,255,0.07);border-top:none;border-radius:0 0 0.75rem 0.75rem;padding:1rem;background:#0d1f35;">
        <p style="font-size:0.8rem;color:#64748b;margin-bottom:0.875rem;">Scores can also be pulled automatically via ESPN above.</p>
        <div style="display:flex;gap:0.25rem;overflow-x:auto;padding-bottom:0.375rem;margin-bottom:1rem;">${grpTabs}</div>
        <div>${gameRows}</div>
      </div>
    </details>

    ${(()=>{
      const enteredGames = GROUP_GAMES.filter(g=>S.gResults[g.id])
        .sort((a,b)=>a.date.localeCompare(b.date)||a.id-b.id);
      const resultRows = enteredGames.map(game=>{
        const r=S.gResults[game.id];
        return `<div id="res-row-${game.id}" style="display:flex;align-items:center;gap:0.4rem;padding:0.3rem 0.5rem;border-radius:0.375rem;background:#0a1628;margin-bottom:0.25rem;font-size:0.78rem;">
          <span style="color:#475569;white-space:nowrap;min-width:4.5rem;">G${game.g} MD${game.md}</span>
          <span style="color:#cbd5e1;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;">${flag(game.home)} ${game.home}</span>
          <span data-score style="color:#fcd34d;font-weight:700;font-family:monospace;white-space:nowrap;padding:0 0.25rem;">${r[0]}–${r[1]}</span>
          <span style="color:#cbd5e1;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${game.away} ${flag(game.away)}</span>
          <span data-actions style="display:flex;gap:0.25rem;flex-shrink:0;">
            <button onclick="editResult(${game.id})" style="font-size:0.68rem;color:#94a3b8;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:0.3rem;padding:0.15rem 0.4rem;cursor:pointer;">Edit</button>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;flex-wrap:wrap;gap:0.5rem;">
        <h2 style="font-weight:600;color:white;font-size:0.95rem;margin:0;">Results</h2>
        <span style="font-size:0.78rem;color:#64748b;">${enteredGames.length} of ${GROUP_GAMES.length} entered</span>
      </div>
      <div style="display:flex;gap:0.5rem;margin-bottom:${enteredGames.length>0?'1rem':'0'};">
        <input class="text-in" type="text" id="rimport-in" placeholder="Paste export code to import results…" style="border-radius:0.5rem;" />
        <button class="btn-g" onclick="doImportResults()" style="border-radius:0.5rem;padding:0.5rem 1rem;white-space:nowrap;">Import</button>
      </div>
      ${enteredGames.length>0?`
        <div style="border-top:1px solid rgba(255,255,255,0.06);padding-top:0.75rem;">
          <p style="font-size:0.75rem;color:#475569;margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.05em;">Entered results</p>
          <div>${resultRows}</div>
        </div>`:``}
    </div>`;
    })()}

    <div style="background:#112a45;border:1px solid rgba(255,255,255,0.07);border-radius:0.75rem;padding:1rem;margin-top:1.25rem;">
      <h2 style="font-weight:600;color:white;margin-bottom:0.25rem;">Import predictions</h2>
      <p style="color:#64748b;font-size:0.875rem;margin-bottom:0.75rem;">Paste a code from another participant to add them to the comparison.</p>
      <div style="display:flex;gap:0.5rem;">
        <input class="text-in" type="text" id="import-in" placeholder="Paste prediction code…" style="border-radius:0.5rem;" />
        <button class="btn-g" onclick="doImport()" style="border-radius:0.5rem;padding:0.5rem 1rem;white-space:nowrap;">Import</button>
      </div>
      ${S.imported.map((p,i)=>`
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:0.875rem;background:#0a1628;padding:0.5rem 0.75rem;border-radius:0.5rem;margin-top:0.5rem;">
          <span style="color:#cbd5e1;">${esc(p.name)} <span style="color:#64748b;">(${Object.keys(p.gPreds||{}).length} group preds)</span></span>

    ${(()=>{const W=getWeights();return`

      <p style="color:#64748b;font-size:0.875rem;margin-bottom:0.875rem;">Used in the leaderboard "Weighted score" leader box on Compare.</p>
      <div style="font-size:0.875rem;color:#94a3b8;margin-bottom:0.75rem;font-family:monospace;background:#0a1628;padding:0.5rem 0.75rem;border-radius:0.5rem;">

      </div>
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:flex-end;">

          <input id="w-a" type="number" min="0" step="0.5" value="${W.a}" class="score-in" style="width:5rem;text-align:center;" />

          B (exact)
          <input id="w-b" type="number" min="0" step="0.5" value="${W.b}" class="score-in" style="width:5rem;text-align:center;" />

// ═══════════════════════════════════════════════════════════
// GROUPS TAB
// ═══════════════════════════════════════════════════════════
function renderGroupsTab(){
  const grpKeys=Object.keys(GROUPS);
  const participants=[];
  if(S.name&&Object.keys(S.gPreds).length>0) participants.push({name:S.name,gPreds:S.gPreds});
  participants.push(...S.imported);

  // Picker map for group-winner predictions + uniform team column width across all 12 groups
  _gwPickerMap = _buildGWPickerMap();
  const _allTeamNames = Object.values(GROUPS).flat();
  const _maxNameLen   = Math.max(..._allTeamNames.map(n => n.length));
  const _teamColW     = `${(_maxNameLen * 0.44 + 2.6).toFixed(1)}rem`;

  // Shared row padding — same in both standings and metrics so rows line up
  const _rp = '0.3rem 0.5rem';

  // colour coding: best = green, worst = red, middle/tied = neutral
  function metricColor(val, allVals, lowerBetter){
    const nums=allVals.filter(v=>v!==null);
    if(nums.length<2) return '#94a3b8';
    const mn=Math.min(...nums), mx=Math.max(...nums);
    if(mn===mx) return '#94a3b8';
    return lowerBetter
      ? (val===mn?'#4ade80':val===mx?'#f87171':'#94a3b8')
      : (val===mx?'#4ade80':val===mn?'#f87171':'#94a3b8');
  }

  const cards=grpKeys.map(g=>{
    const games=GROUP_GAMES.filter(x=>x.g===g);
    const completed=games.filter(x=>S.gResults[x.id]);
    const allDone=completed.length===games.length;
    const actualSt=actualGroupStandings(g);

    const statusLabel=allDone
      ? `<span style="font-size:0.65rem;color:#4ade80;font-weight:600;">✓ Complete</span>`
      : completed.length>0
        ? `<span style="font-size:0.65rem;color:#fbbf24;">${completed.length}/${games.length} played</span>`
        : `<span style="font-size:0.65rem;color:#334155;">Not started</span>`;

    // Standings table — left panel
    const stRows=actualSt.map((t,i)=>{
      const adv=i<2, third=i===2;
      const played=t.w+t.d+t.l;
      const pie=_pickerPie(g, t.name);
      return `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
        <td style="padding:${_rp};text-align:center;font-size:0.7rem;font-weight:700;color:${adv?'#4ade80':third?'#fbbf24':'#475569'};">${i+1}</td>
        <td style="padding:${_rp};font-size:0.8rem;">
          <div style="display:flex;align-items:center;gap:0.22rem;overflow:hidden;">
            <span style="flex-shrink:0;">${flag(t.name)}</span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1;">${shortTeamName(t.name)}</span>
            ${pie}
          </div>
        </td>
        <td style="padding:${_rp};text-align:center;font-size:0.75rem;color:#64748b;">${played}</td>
        <td style="padding:${_rp};text-align:center;font-size:0.75rem;color:#94a3b8;">${t.w}</td>
        <td style="padding:${_rp};text-align:center;font-size:0.75rem;color:#64748b;">${t.d}</td>
        <td style="padding:${_rp};text-align:center;font-size:0.75rem;color:#64748b;">${t.l}</td>
        <td style="padding:${_rp};text-align:center;font-size:0.75rem;color:#94a3b8;">${t.gd>=0?'+':''}${t.gd}</td>
        <td style="padding:${_rp};text-align:center;font-weight:700;font-size:0.85rem;color:${adv?'#4ade80':third?'#fbbf24':'#e2e8f0'};">${t.pts}</td>
      </tr>`;
    }).join('');
    const standingsHTML=`<table style="border-collapse:collapse;table-layout:fixed;width:auto;">
      <thead><tr style="font-size:0.65rem;color:#475569;text-transform:uppercase;letter-spacing:0.04em;border-bottom:1px solid rgba(255,255,255,0.06);">
        <th style="padding:${_rp};text-align:center;width:1.6rem;">#</th>
        <th style="padding:${_rp};text-align:left;width:${_teamColW};">Team</th>
        <th style="padding:${_rp};text-align:center;width:1.6rem;">P</th>
        <th style="padding:${_rp};text-align:center;width:1.6rem;">W</th>
        <th style="padding:${_rp};text-align:center;width:1.6rem;">D</th>
        <th style="padding:${_rp};text-align:center;width:1.6rem;">L</th>
        <th style="padding:${_rp};text-align:center;width:2.4rem;">GD</th>
        <th style="padding:${_rp};text-align:center;width:2.4rem;">Pts</th>
      </tr></thead>
      <tbody>${stRows}</tbody>
    </table>`;

    // Per-person stats table — right panel
    let statsHTML='';
    if(participants.length>0){
      const stats=participants.map(p=>{
        let correct=0,exact=0,bad=0,gamesScored=0;
        for(const game of completed){
          const r=S.gResults[game.id];
          const pr=p.gPreds[game.id];
          if(!pr) continue;
          gamesScored++;
          const sc=pts(pr[0],pr[1],r[0],r[1]);
          if(sc>=1) correct++;
          if(sc===3) exact++;
          bad+=Math.abs(pr[0]-r[0])+Math.abs(pr[1]-r[1]);
        }
        let positions=null;
        if(allDone){
          positions=0;
          const predSt=predGroupStandings(g,p.gPreds);
          actualSt.forEach((team,i)=>{ if(predSt.findIndex(t=>t.name===team.name)===i) positions++; });
        }
        return {name:p.name,correct,exact,bad,positions,gamesScored};
      });

      const metrics=[
        {label:'Correct',   key:'correct',   lowerBetter:false, den:()=>completed.length, tip:'Games where result (W/D/L) was predicted correctly'},
        {label:'Exact',     key:'exact',     lowerBetter:false, den:()=>completed.length, tip:'Games where exact score was predicted'},
        {label:'Points↓',  key:'bad',       lowerBetter:true,  den:()=>null,              tip:'Total goal error vs actual scores — lower is better'},
        {label:'Standings', key:'positions', lowerBetter:false, den:()=>allDone?4:null,   tip:'How many of the 4 final group positions each person predicted correctly (shown once all group games are played)'},
      ];

      const shortName=u=>esc(u.name.length>10?u.name.slice(0,9)+'…':u.name);
      const colHeaders=stats.map(s=>`<th style="padding:${_rp};text-align:center;font-size:0.7rem;color:#64748b;font-weight:500;max-width:5rem;" title="${esc(s.name)}">${shortName(s)}</th>`).join('');

      const metricRows=metrics.map(m=>{
        const vals=stats.map(s=>m.key==='positions'?s.positions:s[m.key]);
        const cells=stats.map((s,i)=>{
          const val=vals[i];
          if(val===null) return `<td style="padding:${_rp};text-align:center;font-size:0.8rem;color:#334155;">–</td>`;
          const col=metricColor(val,vals,m.lowerBetter);
          const den=m.den();
          const display=den!==null?`${val}<span style="font-size:0.65rem;color:#475569;">/${den}</span>`:`${val}`;
          return `<td style="padding:${_rp};text-align:center;font-weight:700;font-size:0.85rem;color:${col};">${display}</td>`;
        }).join('');
        return `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
          <td style="padding:${_rp};font-size:0.72rem;color:#64748b;white-space:nowrap;cursor:default;position:sticky;left:0;z-index:1;background:#0d1f35;border-right:1px solid rgba(255,255,255,0.08);" title="${m.tip||''}">${m.label}</td>
          ${cells}
        </tr>`;
      }).join('');

      statsHTML=`<table style="border-collapse:collapse;height:100%;">
        <thead><tr style="border-bottom:1px solid rgba(255,255,255,0.08);">
          <th style="padding:${_rp};text-align:left;font-size:0.65rem;color:#475569;font-weight:400;position:sticky;left:0;z-index:2;background:#0d1f35;border-right:1px solid rgba(255,255,255,0.08);"></th>
          ${colHeaders}
        </tr></thead>
        <tbody>${metricRows}</tbody>
      </table>`;
    } else {
      statsHTML=`<div style="padding:1rem;font-size:0.8rem;color:#334155;display:flex;align-items:center;justify-content:center;height:100%;">Import predictions to compare</div>`;
    }

    return `<div style="background:#0d1f35;border:1px solid rgba(255,255,255,0.08);border-radius:0.75rem;overflow:hidden;margin-bottom:0.75rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:0.5rem 0.75rem;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.06);">
        <span style="font-size:0.75rem;font-weight:700;color:#94a3b8;letter-spacing:0.05em;">GROUP ${g}</span>
        ${statusLabel}
      </div>
      <div style="display:flex;min-width:0;">
        <div style="flex:0 0 auto;border-right:3px solid rgba(255,255,255,0.18);">${standingsHTML}</div>
        <div style="flex:1 1 0;min-width:0;overflow-x:auto;">${statsHTML}</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div style="margin-bottom:0.75rem;">
      <p style="color:#64748b;font-size:0.8rem;">
        <span style="color:#4ade80;">■</span> Advances · <span style="color:#fbbf24;">■</span> 3rd place pool
        ${participants.length>0?' · <span style="color:#4ade80;">green</span> = best, <span style="color:#f87171;">red</span> = worst per group':''}
      </p>
    </div>
    <div>${cards}</div>`;
}

function renderPicksTab(){
  const tab = S.picksTab || 'groups';
  const koRounds = [{key:'r32',label:'R32'},{key:'r16',label:'R16'},{key:'qf',label:'Quarters'},{key:'sf',label:'Semis'},{key:'f',label:'Final'}];
  const groupBtn = `<button class="tab${tab==='groups'?' on':''}" onclick="S.picksTab='groups';render()">📊 Group Stage</button>`;
  const koButtons = koRounds.map(r=>`<button class="rnd-tab${tab===r.key?' on':''}" onclick="S.picksTab='${r.key}';render()">${r.label}</button>`).join('');
  const tabBar = `<div style="display:flex;gap:0.25rem;overflow-x:auto;padding-bottom:0.5rem;flex-wrap:nowrap;align-items:center;margin-bottom:0.75rem;">
    ${groupBtn}
    <span style="color:#334155;margin:0 0.25rem;">|</span>
    <span style="font-size:0.7rem;color:#475569;white-space:nowrap;margin-right:0.25rem;">Knockout:</span>
    ${koButtons}
  </div>`;
  const content = tab === 'groups' ? renderGroupsTab() : renderPicksKO(tab);
  return tabBar + content;
}

function renderPicksKO(round){
  // Gather all participants
  const participants = [];
  if(S.name) participants.push({name:S.name, avatar:S.avatar||'', kPreds:S.kPreds||{}});
  for(const u of S.imported||[]) participants.push({name:u.name||'', avatar:u.avatar||'', kPreds:u.kPreds||{}});

  if(!participants.length){
    return `<div style="padding:2rem;text-align:center;color:#475569;font-size:0.875rem;">
      No participants yet — enter your name in the Predict tab and sync from the hub.</div>`;
  }

  // Build ordered game list for this round
  const posLabel = p => p.startsWith('3rd-slot-') ? '3rd' : p;
  let games = [];
  if(round==='r32'){
    games = R32_FIXED.map((m,i) => ({
      id: m.id,
      label: `G${i+1}`,
      sub: `${posLabel(m.posA)} v ${posLabel(m.posB)}`,
      date: m.date,
    }));
  } else if(round==='r16'){
    const r16dates = ['2026-07-04','2026-07-05','2026-07-05','2026-07-06','2026-07-06','2026-07-07','2026-07-07','2026-07-04'];
    games = Array.from({length:8}, (_,i) => ({id:`r16-${i+1}`, label:`G${i+1}`, date:r16dates[i]}));
  } else if(round==='qf'){
    games = [
      {id:'qf-1', label:'G1', date:'2026-07-09'},
      {id:'qf-2', label:'G2', date:'2026-07-09'},
      {id:'qf-3', label:'G3', date:'2026-07-10'},
      {id:'qf-4', label:'G4', date:'2026-07-10'},
    ];
  } else if(round==='sf'){
    games = [
      {id:'sf-1', label:'SF 1', date:'2026-07-14'},
      {id:'sf-2', label:'SF 2', date:'2026-07-15'},
    ];
  } else if(round==='f'){
    games = [
      {id:'3rd',   label:'3rd Place', date:'2026-07-18'},
      {id:'final', label:'Final',     date:'2026-07-19'},
    ];
  }

  // Avatar header for each participant
  const headerCells = participants.map(p => {
    const short = p.name.length > 9 ? p.name.slice(0,8)+'…' : p.name;
    const av = p.avatar
      ? `<img src="${p.avatar}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;">`
      : `<div style="width:24px;height:24px;border-radius:50%;background:#1e3a5f;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:700;color:#94a3b8;">${(p.name||'?')[0].toUpperCase()}</div>`;
    return `<th style="padding:0.4rem 0.6rem;text-align:center;min-width:8rem;">
      <div style="display:flex;flex-direction:column;align-items:center;gap:0.2rem;">
        ${av}
        <span style="font-size:0.62rem;color:#64748b;white-space:nowrap;">${esc(short)}</span>
      </div>
    </th>`;
  }).join('');

  // One row per game, with optional date-separator rows
  const rows = [];
  let lastDate = null;
  const fmtDate = d => d ? new Date(d+'T12:00:00Z').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';

  for(const game of games){
    if(game.date && game.date !== lastDate){
      lastDate = game.date;
      rows.push(`<tr>
        <td colspan="${participants.length+1}" style="padding:0.25rem 0.6rem;font-size:0.6rem;font-weight:700;color:#475569;background:#0d1f35;text-transform:uppercase;letter-spacing:0.07em;border-bottom:1px solid rgba(255,255,255,0.06);">
          ${fmtDate(game.date)}
        </td>
      </tr>`);
    }

    const cells = participants.map(p => {
      const kp = p.kPreds[game.id];
      if(!kp || kp.homeScore == null){
        return `<td style="padding:0.3rem 0.6rem;text-align:center;color:#334155;font-size:0.8rem;">–</td>`;
      }
      const hName = kp.home || '?';
      const aName = kp.away || '?';
      // Determine winner to size flags: winner bigger, loser smaller
      let hSz = '1.1rem', aSz = '1.1rem';
      if(kp.homeScore != null && kp.awayScore != null){
        if(kp.homeScore > kp.awayScore)                          { hSz='1.45rem'; aSz='0.85rem'; }
        else if(kp.awayScore > kp.homeScore)                     { aSz='1.45rem'; hSz='0.85rem'; }
        else if(kp.penWinner){
          if(kp.penWinner===kp.home)                             { hSz='1.45rem'; aSz='0.85rem'; }
          else                                                    { aSz='1.45rem'; hSz='0.85rem'; }
        }
      }
      const hFlag = `<span title="${esc(hName)}" style="cursor:help;font-size:${hSz};line-height:1;transition:font-size 0.1s;">${flag(hName)}</span>`;
      const aFlag = `<span title="${esc(aName)}" style="cursor:help;font-size:${aSz};line-height:1;transition:font-size 0.1s;">${flag(aName)}</span>`;
      let pen = '';
      // Only show penalty if score is genuinely tied and pen scores are available
      if(kp.homeScore === kp.awayScore && kp.penHome != null && kp.penAway != null){
        pen = `<div style="font-size:0.58rem;color:#64748b;margin-top:0.05rem;">${kp.penHome}–${kp.penAway}p</div>`;
      }
      return `<td style="padding:0.25rem 0.6rem;text-align:center;">
        <div style="display:inline-flex;flex-direction:column;align-items:center;gap:0;white-space:nowrap;">
          <div style="display:flex;align-items:center;gap:0.28rem;">
            ${hFlag}
            <span style="font-size:0.72rem;font-weight:700;color:#e2e8f0;">${kp.homeScore}–${kp.awayScore}</span>
            ${aFlag}
          </div>
          ${pen}
        </div>
      </td>`;
    }).join('');

    rows.push(`<tr style="border-bottom:1px solid rgba(255,255,255,0.04);">
      <td style="padding:0.3rem 0.6rem;white-space:nowrap;border-right:1px solid rgba(255,255,255,0.06);position:sticky;left:0;z-index:1;background:#0d1f35;">
        <div style="font-size:0.68rem;font-weight:700;color:#94a3b8;">${game.label}</div>
        ${game.sub ? `<div style="font-size:0.56rem;color:#475569;margin-top:0.05rem;">${game.sub}</div>` : ''}
      </td>
      ${cells}
    </tr>`);
  }

  const roundNames = {r32:'Round of 32', r16:'Round of 16', qf:'Quarter-finals', sf:'Semi-finals', f:'Final'};

  return `<div style="background:#0d1f35;border:1px solid rgba(255,255,255,0.08);border-radius:0.75rem;overflow:hidden;">
    <div style="padding:0.45rem 0.75rem;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.06);">
      <span style="font-size:0.72rem;font-weight:700;color:#94a3b8;letter-spacing:0.05em;">${roundNames[round]||round}</span>
    </div>
    <div style="overflow-x:auto;">
      <table style="border-collapse:collapse;min-width:100%;">
        <thead>

const ESPN_TEAM_MAP = {
  'United States':                'USA',

function espnName(n){ return ESPN_TEAM_MAP[n] || n; }

let _livePollTimer = null;
async function fetchLiveScores(silent){
  if(_livePollTimer){ clearTimeout(_livePollTimer); _livePollTimer = null; }
  const btn = silent ? null : document.getElementById('fetch-btn');
  if(btn){ btn.textContent = '⏳ Fetching…'; btn.disabled = true; }
  try {
    // Full WC group stage window Jun 11 – Jul 2; limit=100 covers all 72 games
    const url = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=20260611-20260702&limit=100';
    const res = await fetch(url);
    if(!res.ok) throw new Error(`ESPN returned ${res.status}`);
    const data = await res.json();
    const events = data.events || [];

    let imported = 0, live = 0, skipped = 0;
    S.gLive = {}; // reset live data each fetch
    for(const ev of events){
      const comp = ev.competitions?.[0];
      if(!comp) continue;
      const statusType = comp.status?.type;
      const state = statusType?.state; // 'pre' | 'in' | 'post'
      if(state === 'pre') continue; // not started

      const espnHome = comp.competitors?.find(c => c.homeAway === 'home');
      const espnAway = comp.competitors?.find(c => c.homeAway === 'away');
      if(!espnHome || !espnAway) continue;

      const hName = espnName(espnHome.team?.displayName || '');
      const aName = espnName(espnAway.team?.displayName || '');
      const hs = parseInt(espnHome.score);
      const as = parseInt(espnAway.score);
      if(isNaN(hs) || isNaN(as)) continue;

      // Match fixture by team names — try both orientations
      let game = GROUP_GAMES.find(g => g.home === hName && g.away === aName);
      let flipped = false;
      if(!game){
        game = GROUP_GAMES.find(g => g.home === aName && g.away === hName);
        flipped = true;
      }
      if(!game){ skipped++; continue; }

      const scoreH = flipped ? as : hs;
      const scoreA = flipped ? hs : as;

      if(state === 'post'){
        S.gResults[game.id] = [scoreH, scoreA]; imported++;
      } else {
        // In progress
        S.gLive[game.id] = {
          hs: scoreH, as: scoreA,
          clock: comp.status?.displayClock || '',
          detail: statusType?.shortDetail || statusType?.description || 'LIVE'
        };
        live++;
      }
    }

    localStorage.setItem('wc26_espn_fetched', new Date().toISOString());
    persist(); render();

    if(!silent){
      const parts = [];
      if(imported) parts.push(`${imported} result${imported>1?'s':''} updated`);
      if(live) parts.push(`${live} live`);
      if(skipped) parts.push(`${skipped} unmatched`);
      alert(parts.length ? `✓ ${parts.join(' · ')}` : 'No finished or live matches found yet — check back once the tournament starts (Jun 11).');
    }

    // Auto-poll every 60s while any game is live
    if(Object.keys(S.gLive).length > 0){
      _livePollTimer = setTimeout(() => fetchLiveScores(true), 60000);
    }
  } catch(e){
    if(!silent) alert('Fetch failed: ' + e.message);
    else console.warn('Background ESPN fetch failed:', e.message);
  } finally {
    if(btn){ btn.textContent = '🔄 Fetch scores'; btn.disabled = false; }
  }
}

// Drag-and-drop tiebreaker helpers
let _dragTieGrp=null;
function dragTieStart(e,g){ _dragTieGrp=g; e.dataTransfer.effectAllowed='move'; e.currentTarget.style.opacity='0.5'; }
function dragTieOver(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; }
function dragTieEnter(e){ e.currentTarget.style.background='rgba(99,102,241,0.2)'; }
function dragTieLeave(e){ e.currentTarget.style.background=''; }
function dragTieDrop(e,targetG){
  e.preventDefault();
  e.currentTarget.style.background='';
  if(!_dragTieGrp||_dragTieGrp===targetG) return;
  const {tiedGroups}=ranked3rds();
  const userOrder=S.thirdOrder.filter(g=>tiedGroups.includes(g));
  const unordered=tiedGroups.filter(g=>!userOrder.includes(g));
  const ordered=[...userOrder,...unordered];
  const fi=ordered.indexOf(_dragTieGrp), ti=ordered.indexOf(targetG);
  if(fi<0||ti<0) return;
  ordered.splice(fi,1); ordered.splice(ti,0,_dragTieGrp);
  S.thirdOrder=ordered; persist(); render();
}
function dragTieEnd(e){ e.currentTarget.style.opacity=''; _dragTieGrp=null; }

// Move a tied 3rd-place team up (-1) or down (+1) in the tiebreaker order
function moveTied(group, dir){
  const {tiedGroups} = ranked3rds();
  if(!tiedGroups.includes(group)) return;

  // Build current ordered list of tied groups
  const userOrder  = S.thirdOrder.filter(g=>tiedGroups.includes(g));
  const unordered  = tiedGroups.filter(g=>!userOrder.includes(g));
  const ordered    = [...userOrder, ...unordered];

  const i = ordered.indexOf(group);
  const j = i + dir;
  if(j < 0 || j >= ordered.length) return;

  // Swap
  [ordered[i], ordered[j]] = [ordered[j], ordered[i]];
  S.thirdOrder = ordered;
  persist();
  render();
}

function inputKo(mid, side, inp){

  const n   = Math.min(Math.max(nw - old, 0), 5);
  if(n>0) _pendingGoalAnim={mid, side, count:n};
  setKo(mid, side, inp.value);
  if(_pendingGoalAnim){
    const {mid:m,side:s,count:c}=_pendingGoalAnim; _pendingGoalAnim=null;

}

// Knockout score handlers
function setKo(mid, side, val){
  const v=val===''?null:Math.max(0,Math.min(20,parseInt(val)||0));
  if(!S.kPreds[mid]) S.kPreds[mid]={home:'',away:'',homeScore:undefined,awayScore:undefined,penWinner:'',penHome:undefined,penAway:undefined};
  if(side==='h') S.kPreds[mid].homeScore=v!=null?v:0;
  else           S.kPreds[mid].awayScore=v!=null?v:0;
  const kp=S.kPreds[mid];
  // If the score is now decisive (not a draw), wipe any stale penalty data
  if(kp.homeScore!==undefined && kp.awayScore!==undefined && kp.homeScore!==kp.awayScore){
    kp.penHome=undefined; kp.penAway=undefined; kp.penWinner='';
  }
  persist();
  if(kp.homeScore!==undefined && kp.awayScore!==undefined) render();
}
function adj_pen(mid, side, delta){
  const kp=S.kPreds[mid]; if(!kp) return;
  const cur = side==='h'?(kp.penHome??0):(kp.penAway??0);
  setPenScore(mid, side, String(Math.max(0, cur+delta)));
  render();
}
function adj_ko(mid, side, delta){
  const inp=document.querySelector(`input[data-mid="${mid}"][data-side="${side}"]`);
  if(!inp) return;
  const nv=Math.max(0,Math.min(20,(parseInt(inp.value)||0)+delta));
  inp.value=nv;
  if(delta>0) _pendingGoalAnim={mid, side, count:1};
  setKo(mid,side,String(nv));
  // If setKo didn't trigger render(), fire directly
  if(_pendingGoalAnim){ _pendingGoalAnim=null; _fireGoalAnim(mid,side); }
}
function _penIsValid(ph, pa){
  if(ph===undefined||pa===undefined) return {valid:false,msg:''};
  if(ph===pa) return {valid:false,msg:'Scores must differ — one team wins'};
  const mx=Math.max(ph,pa), mn=Math.min(ph,pa);
  if(mx>5 && mx-mn!==1) return {valid:false,msg:'After sudden death, scores must differ by exactly 1 (e.g. 6–5, 7–6)'};
  return {valid:true,msg:''};
}

function setPenScore(mid, side, val){
  if(!S.kPreds[mid]) S.kPreds[mid]={home:'',away:'',homeScore:undefined,awayScore:undefined};
  const kp=S.kPreds[mid];
  const v=val===''?undefined:Math.max(0,Math.min(20,parseInt(val)||0));
  if(side==='h') kp.penHome=v; else kp.penAway=v;
  // Derive penWinner from scores — only if valid
  const {valid}=_penIsValid(kp.penHome, kp.penAway);
  if(valid)
    kp.penWinner = kp.penHome > kp.penAway ? kp.home : kp.away;
  else
    kp.penWinner='';
  persist();

  // Update DOM without full re-render
  const card=document.getElementById('card-ko-'+mid);
  if(!card) return;

  // Update input border colours
  const inputs=card.querySelectorAll('[data-pen]');
  const ph=kp.penHome, pa=kp.penAway;
  const bothSet=ph!==undefined&&pa!==undefined;
  inputs.forEach(inp=>{
    const isHome=inp.dataset.pen==='h';
    const winning=valid&&(isHome?ph>pa:pa>ph);
    const losing=valid&&(isHome?ph<pa:pa<ph);
    inp.style.borderColor=winning?'rgba(74,222,128,0.5)':losing?'rgba(248,113,113,0.3)':'rgba(255,255,255,0.15)';
  });

  // Show/hide validation warning
  const warn=card.querySelector('[data-pen-warn]');
  if(warn){
    const {valid:ok,msg}=_penIsValid(ph,pa);
    warn.textContent=msg;
    warn.style.display=(bothSet&&!ok)?'block':'none';
  }

  // Update card predicted state
  const done=kp.homeScore!==undefined&&kp.awayScore!==undefined&&
    (kp.homeScore!==kp.awayScore||(bothSet&&valid));
  card.classList.toggle('predicted',done);
}

    'qf-4':   ['France',          'England'],
    'sf-1':   ['Brazil',          'Spain'],
    'sf-2':   ['Germany',         'France'],
    '3rd':    ['Spain',           'Germany'],
    'final':  ['Brazil',          'France'],
  };

  function simKP(name) {
    const rng = mkRng(name + '|ko');
    const kp = {};
    for (const [id, [home, away]] of Object.entries(KO)) {
      const hs = rs(rng), as = rs(rng);
      let penWinner = '', penHome, penAway;
      if (hs === as) {
        const hw = rng() < 0.5;
        penWinner = hw ? home : away;
        [penHome, penAway] = pens(rng, hw);
      }
      kp[id] = { home, away, homeScore: hs, awayScore: as,
                 penWinner, penHome, penAway };
    }
    return kp;
  }

  const [me, ...others] = USERS;
  S.name          = me;
  S.avatar        = '';
  S.gPreds        = simGP(me);
  S.kPreds        = simKP(me);
  S.gResults      = SIM_RESULTS;
  S.kResults      = {};
  S.thirdOrder    = [];
  S.view          = 'picks';
  S.picksTab      = 'groups';
  S.predTab       = 'md1';
  S.adminUnlocked = false;
  S.imported      = others.map(n => ({
    name: n, avatar: '',
    gPreds: simGP(n),
    kPreds: simKP(n),
  }));

  render();

  document.title = '⚽ WC 2026 Predictor [SIM]';
  const banner = document.createElement('div');
  banner.style.cssText =
    'position:fixed;bottom:0;left:0;right:0;z-index:9999;' +
    'background:#7c3aed;color:#fff;text-align:center;' +
    'font-size:0.7rem;font-weight:700;letter-spacing:0.06em;' +
    'padding:0.2rem 0.5rem;pointer-events:none;';
  banner.textContent = '⚠ SIM MODE — 10 fake participants, randomised picks, synthetic results — no real data';
  document.body.appendChild(banner);

})();
</script>
