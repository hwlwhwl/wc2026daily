<title>⚽ WC2026 Daily Pick'em</title>

<style>
:root{
  --bg:#0a1628;--bg-card:#112a45;--bg-input:#0d1f35;--bg-tint:rgba(255,255,255,.05);
  --text:#f1f5f9;--text-strong:#fff;--text-muted:#94a3b8;--text-faint:#64748b;
  --border:rgba(255,255,255,.08);--border-soft:rgba(255,255,255,.05);--border-strong:rgba(255,255,255,.2);
  --accent:#16a34a;--accent-h:#15803d;--shadow:none;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type=number]{-moz-appearance:textfield;}
/* Goal counter */
.goal-cell{display:flex;flex-direction:column;align-items:center;gap:0;}
.goal-frame{position:relative;width:4.5rem;height:2.25rem;border:3px solid #fff;border-bottom:none;
  border-radius:2px 2px 0 0;overflow:hidden;
  background:repeating-linear-gradient(90deg,rgba(255,255,255,.35) 0,rgba(255,255,255,.35) 1px,transparent 1px,transparent 11px),
             repeating-linear-gradient(0deg,rgba(255,255,255,.35) 0,rgba(255,255,255,.35) 1px,transparent 1px,transparent 8px);}
.score-disp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:1.3rem;font-weight:900;font-family:'Courier New',monospace;
  text-shadow:0 0 8px rgba(0,0,0,.9),0 1px 4px rgba(0,0,0,.7);user-select:none;}
.goal-btns{display:flex;gap:3px;margin-top:3px;}
.goal-btn{width:1.6rem;height:1.1rem;border:none;border-radius:3px;background:rgba(255,255,255,.1);
  color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;line-height:1;
  display:flex;align-items:center;justify-content:center;transition:background .12s,transform .08s;}
.goal-btn:hover{background:rgba(255,255,255,.22);}
.goal-btn:active{transform:scale(.88);}
/* Tabs */
.tab{padding:.375rem .75rem;border-radius:.375rem;font-size:.875rem;font-weight:500;cursor:pointer;
  border:none;background:transparent;color:#64748b;white-space:nowrap;transition:all .12s;}
.tab:hover{color:#f1f5f9;}
.tab.on{background:var(--accent);color:white;}
.tab:disabled{opacity:.4;cursor:not-allowed;}
/* Buttons */
.btn-g{background:var(--accent);color:white;border:none;border-radius:.75rem;
  padding:.65rem 1.5rem;font-weight:600;cursor:pointer;transition:background .12s;font-size:.95rem;}
.btn-g:hover{background:var(--accent-h);}
.btn-g:disabled{background:#1e3a5f;color:#64748b;cursor:not-allowed;}
.btn-s{background:rgba(255,255,255,.08);color:#f1f5f9;border:1px solid rgba(255,255,255,.15);
  border-radius:.75rem;padding:.65rem 1.5rem;font-weight:600;cursor:pointer;transition:all .12s;font-size:.95rem;}
.btn-s:hover{background:rgba(255,255,255,.14);}
.btn-danger{background:rgba(220,38,38,.15);color:#f87171;border:1px solid rgba(220,38,38,.3);
  border-radius:.5rem;padding:.3rem .65rem;font-weight:600;cursor:pointer;font-size:.78rem;transition:all .12s;}
.btn-danger:hover{background:rgba(220,38,38,.3);}
.btn-sm{background:rgba(255,255,255,.08);color:#f1f5f9;border:1px solid rgba(255,255,255,.12);
  border-radius:.5rem;padding:.28rem .65rem;font-weight:500;cursor:pointer;transition:all .12s;font-size:.78rem;}
.btn-sm:hover{background:rgba(255,255,255,.15);}
/* Inputs */
.text-in{width:100%;background:var(--bg-input);border:1px solid rgba(255,255,255,.15);
  border-radius:.75rem;padding:.7rem 1rem;color:#f1f5f9;font-size:.95rem;}
.text-in:focus{outline:none;border-color:var(--accent);}
.score-in{width:3.2rem;text-align:center;padding:.2rem;background:var(--bg-input);
  border:1px solid rgba(255,255,255,.2);border-radius:.375rem;color:#f1f5f9;font-size:.95rem;font-weight:700;}
.score-in:focus{outline:none;border-color:var(--accent);}
/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:.75rem;padding:1rem;}
/* Photo upload */
.photo-drop{width:5rem;height:5rem;border-radius:50%;border:2px dashed rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;
  overflow:hidden;flex-shrink:0;transition:border-color .15s;background:rgba(255,255,255,.04);}
.photo-drop:hover{border-color:var(--accent);}
.photo-drop img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
/* Score chips */
.score-chip{display:inline-flex;align-items:center;gap:.25rem;font-size:.7rem;padding:.15rem .45rem;
  border-radius:.3rem;white-space:nowrap;}
.chip-taken{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25);}
.chip-bot{background:rgba(99,102,241,.12);color:#a5b4fc;border:1px solid rgba(99,102,241,.25);}
.chip-free{background:rgba(255,255,255,.07);color:#94a3b8;border:1px solid rgba(255,255,255,.1);}
/* Game pick card */
.game-pick-card{background:var(--bg-card);border:1px solid var(--border);border-radius:.75rem;padding:.875rem 1rem;}
.game-pick-card.invalid{border-color:rgba(239,68,68,.55)!important;}
/* Badges */
.badge-exact{font-size:.68rem;background:rgba(22,163,74,.2);color:#4ade80;
  border:1px solid rgba(22,163,74,.35);padding:.1rem .4rem;border-radius:.25rem;}
.badge-res{font-size:.68rem;background:rgba(234,179,8,.18);color:#facc15;
  border:1px solid rgba(234,179,8,.3);padding:.1rem .4rem;border-radius:.25rem;}
.badge-miss{font-size:.68rem;background:rgba(255,255,255,.06);color:#64748b;
  border:1px solid rgba(255,255,255,.1);padding:.1rem .4rem;border-radius:.25rem;}
.badge-pend{font-size:.68rem;background:rgba(99,102,241,.1);color:#a5b4fc;
  border:1px solid rgba(99,102,241,.2);padding:.1rem .4rem;border-radius:.25rem;}
/* Pick order bar */
.order-bar{display:flex;gap:.75rem;overflow-x:auto;padding:.5rem 0;scrollbar-width:none;}
.order-bar::-webkit-scrollbar{display:none;}
.picker-chip{display:flex;flex-direction:column;align-items:center;gap:.35rem;flex-shrink:0;
  padding:.5rem .6rem;border-radius:.75rem;border:2px solid transparent;transition:all .15s;}
.picker-chip.done{border-color:rgba(22,163,74,.4);background:rgba(22,163,74,.07);}
.picker-chip.current{border-color:#16a34a;background:rgba(22,163,74,.12);}
.picker-chip.waiting{border-color:rgba(255,255,255,.08);background:rgba(255,255,255,.03);}
.picker-chip .p-label{font-size:.65rem;font-weight:600;max-width:5rem;overflow:hidden;

/* Avatar helpers */
.av{border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid rgba(255,255,255,.2);}
/* Points cell */
.pts-big{font-size:1.5rem;font-weight:900;color:#4ade80;font-family:'Courier New',monospace;}
/* Rank badge */
.rank-badge{width:1.5rem;height:1.5rem;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:.7rem;font-weight:800;flex-shrink:0;}
/* Horiz divider */
hr.soft{border:none;border-top:1px solid var(--border);margin:.75rem 0;}

// Pick sessions: session 1 covers Jun 11+12 together; each subsequent date is its own session
// Group stage sessions (fixed)
const GROUP_SESSIONS = buildGroupSessions();
function buildGroupSessions() {
  const allDates = [...new Set(GROUP_GAMES.map(g => g.date))].sort();
  const sessions = [];
  sessions.push({ key:'s-day1-2', label:'Jun 11–12', dates:['2026-06-11','2026-06-12'] });
  for (const d of allDates) {
    if (d === '2026-06-11' || d === '2026-06-12') continue;
    const [,m,dd] = d.split('-');
    sessions.push({ key:`s-${d}`, label:`Jun ${parseInt(dd)}`, dates:[d] });
  }
  return sessions;
}

// Dynamic: group sessions + knockout sessions derived from state.knockoutGames
function getActiveSessions() {
  const sessions = [...GROUP_SESSIONS];
  const koDates = [...new Set((state.knockoutGames||[]).map(g=>g.date))].sort();
  for (const d of koDates) {
    const [,m,dd] = d.split('-');
    const monthLabel = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m)-1];
    sessions.push({ key:`s-${d}`, label:`${monthLabel} ${parseInt(dd)}`, dates:[d], knockout:true });
  }
  return sessions;
}

const STORAGE_KEY = 'wc2026-daily-pickem-v1';

function defaultState() {
  return {
    gameName: 'WC2026 Daily Pick\'em',
    players: [],         // [{id, name, photo}]
    sessions: {},        // {[sessionKey]: {pickOrder:[pids], picks:{[pid]:{[gid]:{h,a,ph?,pa?}}}}}
    results: {},         // {[gid]: {h, a, ph?, pa?}} — ph/pa present for KO games that went to pens
    knockoutGames: [],   // [{id, round, home, away, date}]
    botPens: {},         // {[gid]: {ph, pa}} — bot's penalty picks for KO games (generated once, stored)
    started: false,
    view: 'setup',
  };
}

// Migrate old saves that lack new fields
function migrateState(s) {
  if (!s.knockoutGames) s.knockoutGames = [];
  if (!s.botPens) s.botPens = {};
  return s;
}

let state = loadState();
let currentPicks = {};  // in-progress picks for current picker: {[gid]: {h,a}}
let toastTimer = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? migrateState(JSON.parse(raw)) : defaultState();
  } catch(e) { return defaultState(); }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) { showToast('⚠️ Could not save — localStorage may be full.', 'warn'); }
}

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const AVATAR_COLORS = [
  '#16a34a','#2563eb','#dc2626','#d97706','#7c3aed',
  '#db2777','#0891b2','#65a30d','#c2410c','#4f46e5','#059669','#b45309',
];
function avatarColor(name) {
  let h = 0;
  for (const c of name) h = (h * 31 + c.charCodeAt(0)) | 0;
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function avatarHtml(player, sizePx = 40) {

    return `<div style="width:${sizePx}px;height:${sizePx}px;border-radius:50%;background:#312e81;

      border:2px solid rgba(255,255,255,.2);flex-shrink:0;">`;

}

// ═══════════════════════════════════════════════════════════════
// BUSINESS LOGIC
// ═══════════════════════════════════════════════════════════════

function getSessionGames(sessionKey) {
  const sess = getActiveSessions().find(s => s.key === sessionKey);
  if (!sess) return [];
  const groupGames = GROUP_GAMES.filter(g => sess.dates.includes(g.date));
  const koGames = (state.knockoutGames||[]).filter(g => sess.dates.includes(g.date));
  return [...groupGames, ...koGames];
}

function isKnockoutGame(gameId) {
  return (state.knockoutGames||[]).some(g => g.id === gameId);
}

// Generate + persist bot penalty picks for a knockout game (idempotent)
function getBotPenalties(gameId) {
  if (!state.botPens) state.botPens = {};
  if (!state.botPens[gameId]) {
    let ph, pa;
    do {
      ph = Math.floor(Math.random() * 5); // 0–4
      pa = Math.floor(Math.random() * 5);
    } while (ph === pa);
    state.botPens[gameId] = { ph, pa };
    saveState();
  }
  return state.botPens[gameId];
}

// Scoring for group-stage games
function calcPoints(predH, predA, actH, actA) {
  if (predH === actH && predA === actA) return 3;
  const pOut = predH > predA ? 'H' : predH < predA ? 'A' : 'D';
  const aOut = actH  > actA  ? 'H' : actH  < actA  ? 'A' : 'D';
  return pOut === aOut ? 1 : 0;
}

// Scoring for knockout games.
// 90-min result is scored exactly like a group game (+3 exact, +1 correct result, +0 miss).
// A draw is a draw — the penalty shootout settles who advances but does NOT count as a
// "win" for scoring purposes.
// Decimal bonus: when the actual result went to pens AND the player predicted a draw
//   (so they also made penalty picks), add |pick.ph - pick.pa| / 10.
function calcPointsKO(pick, res) {
  // Score the 90-min result identically to a group game
  let pts = calcPoints(pick.h, pick.a, res.h, res.a);

  // Penalty bonus: actual went to pens AND player predicted a draw with penalty picks
  if (pts > 0 && res.ph != null && pick.h === pick.a && pick.ph != null) {
    pts += Math.abs(pick.ph - pick.pa) / 10;
  }

  return pts;
}

function getOutcome(h, a) { return h > a ? 'H' : h < a ? 'A' : 'D'; }

// Format points: integers stay whole, decimals show 1dp (e.g. 1.2, 3.4)
function fmtPts(n) {
  if (n === null || n === undefined) return '—';
  return n % 1 === 0 ? String(n) : n.toFixed(1);
}

function scoreGamePick(pick, res, gameId) {
  if (isKnockoutGame(gameId)) return calcPointsKO(pick, res);
  return calcPoints(pick.h, pick.a, res.h, res.a);
}

function getPlayerSessionPoints(playerId, sessionKey) {
  const sess = state.sessions[sessionKey];
  if (!sess || !sess.picks[playerId]) return null;
  const picks = sess.picks[playerId];
  let pts = 0, hasResult = false;
  for (const game of getSessionGames(sessionKey)) {
    const res = state.results[game.id];
    if (!res) continue;
    hasResult = true;
    const pick = picks[game.id];
    if (pick) pts += scoreGamePick(pick, res, game.id);
  }
  return hasResult ? pts : null;
}

function getPlayerTotalPoints(playerId) {
  let total = 0;
  for (const sess of getActiveSessions()) {
    const pts = getPlayerSessionPoints(playerId, sess.key);
    if (pts !== null) total += pts;
  }
  return total;
}

function getPlayerStats(playerId) {
  let total = 0, exact = 0, correct = 0, scored = 0;
  for (const sess of getActiveSessions()) {
    const sessData = state.sessions[sess.key];
    if (!sessData || !sessData.picks[playerId]) continue;
    const picks = sessData.picks[playerId];
    for (const game of getSessionGames(sess.key)) {
      const res = state.results[game.id];
      if (!res) continue;
      const pick = picks[game.id];
      if (!pick) continue;
      scored++;
      const pts = scoreGamePick(pick, res, game.id);
      total += pts;
      const base = Math.floor(pts); // strip decimal bonus before counting
      if (base === 3) exact++;
      else if (base === 1) correct++;
    }
  }
  return { total, exact, correct, scored };
}

function getBotGamePick(gameId) {
  if (isKnockoutGame(gameId)) {
    const pens = getBotPenalties(gameId);
    return { h:1, a:1, ph: pens.ph, pa: pens.pa };
  }
  return { h:1, a:1 };
}

function getBotSessionPoints(sessionKey) {
  let pts = 0, hasResult = false;
  for (const game of getSessionGames(sessionKey)) {
    const res = state.results[game.id];
    if (!res) continue;
    hasResult = true;
    pts += scoreGamePick(getBotGamePick(game.id), res, game.id);
  }
  return hasResult ? pts : null;
}

function getBotStats() {
  let total = 0, exact = 0, correct = 0, scored = 0;
  const allGames = [...GROUP_GAMES, ...(state.knockoutGames||[])];
  for (const game of allGames) {
    const res = state.results[game.id];
    if (!res) continue;
    scored++;
    const pts = scoreGamePick(getBotGamePick(game.id), res, game.id);
    total += pts;
    const base = Math.floor(pts);
    if (base === 3) exact++;
    else if (base === 1) correct++;
  }
  return { total, exact, correct, scored };
}

function isTaken(sessionKey, gameId, h, a, excludePlayerId = null) {
  const sess = state.sessions[sessionKey];
  if (!sess) return false;
  for (const [pid, picks] of Object.entries(sess.picks)) {
    if (pid === excludePlayerId) continue;
    const pick = picks[gameId];
    if (pick && pick.h === h && pick.a === a) return true;
  }
  return false;
}

function getTakenScores(sessionKey, gameId, excludePlayerId = null) {
  const sess = state.sessions[sessionKey];
  if (!sess) return [];
  const taken = [];
  const order = sess.pickOrder || [];
  for (const pid of order) {
    if (pid === excludePlayerId) break; // only previous pickers
    const pick = sess.picks[pid] && sess.picks[pid][gameId];
    if (pick) {
      const p = state.players.find(x => x.id === pid);
      taken.push({ h: pick.h, a: pick.a, playerName: p ? p.name : '?' });
    }
  }
  return taken;
}

function getCurrentSession() {
  const active = getActiveSessions();
  for (let i = 0; i < active.length; i++) {
    const sess = active[i];
    const sessData = state.sessions[sess.key];
    if (!sessData) return { idx: i, sess };
    const allPicked = state.players.every(p => sessData.picks[p.id]);
    if (!allPicked) return { idx: i, sess };
  }
  return null;
}

function getCurrentPicker(sessionKey) {
  const sessData = state.sessions[sessionKey];
  if (!sessData) return null;
  const nextId = sessData.pickOrder.find(id => !sessData.picks[id]);
  return state.players.find(p => p.id === nextId) || null;
}

function calculatePickOrder(sessionIndex) {
  const active = getActiveSessions();
  const prevSessKey = active[sessionIndex - 1].key;
  return [...state.players]
    .sort((a, b) => {
      const aDay = getPlayerSessionPoints(a.id, prevSessKey) ?? 0;
      const bDay = getPlayerSessionPoints(b.id, prevSessKey) ?? 0;
      if (aDay !== bDay) return aDay - bDay;
      return getPlayerTotalPoints(a.id) - getPlayerTotalPoints(b.id);
    })
    .map(p => p.id);
}

function initSession(sessionIndex) {
  const active = getActiveSessions();
  const sess = active[sessionIndex];
  if (!sess || state.sessions[sess.key]) return;
  let order;
  if (sessionIndex === 0) {
    order = shuffleArray(state.players.map(p => p.id));
  } else {
    order = calculatePickOrder(sessionIndex);
  }
  state.sessions[sess.key] = { pickOrder: order, picks: {} };
}

function checkSessionComplete(sessionKey) {
  const sessData = state.sessions[sessionKey];
  if (!sessData) return false;
  return state.players.every(p => sessData.picks[p.id]);
}

function onSessionComplete(sessionKey) {
  const active = getActiveSessions();
  const idx = active.findIndex(s => s.key === sessionKey);
  if (idx + 1 < active.length) {
    initSession(idx + 1);
  }
}

// ═══════════════════════════════════════════════════════════════
// KO BRACKET — standings + auto-resolution
// ═══════════════════════════════════════════════════════════════

// Final standings for one group (ranked: pts desc → GD desc → GF desc → alpha)
function getGroupStandings(grp) {
  const grpGames = GROUP_GAMES.filter(g => g.g === grp);
  const teams = {};
  for (const g of grpGames) {
    if (!teams[g.home]) teams[g.home] = { name:g.home, pts:0, gf:0, ga:0, gd:0, played:0 };
    if (!teams[g.away]) teams[g.away] = { name:g.away, pts:0, gf:0, ga:0, gd:0, played:0 };
  }
  for (const g of grpGames) {
    const r = state.results[g.id];
    if (!r) continue;
    const ht = teams[g.home], at = teams[g.away];
    ht.played++; at.played++;
    ht.gf += r.h; ht.ga += r.a; ht.gd = ht.gf - ht.ga;
    at.gf += r.a; at.ga += r.h; at.gd = at.gf - at.ga;
    if      (r.h > r.a) ht.pts += 3;
    else if (r.h < r.a) at.pts += 3;
    else               { ht.pts += 1; at.pts += 1; }
  }
  return Object.values(teams).sort((a, b) =>
    b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.name.localeCompare(b.name)
  );
}

// Returns the best 8 third-place teams once all 12 groups are complete
function getBest3rdPlaceTeams() {
  const thirds = [];
  for (const grp of 'ABCDEFGHIJKL') {
    const st = getGroupStandings(grp);
    if (st.length >= 3) thirds.push({ ...st[2], group: grp });
  }
  thirds.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.name.localeCompare(b.name));
  return thirds.slice(0, 8);
}

// Resolve a slot code → team name, or null if not yet determinable
function resolveKOSlot(slot) {
  // Group winner/runner-up: '1A', '2L', etc.
  const gpM = slot.match(/^([12])([A-L])$/);
  if (gpM) {
    const pos = parseInt(gpM[1]) - 1;
    const grp = gpM[2];
    const grpGames = GROUP_GAMES.filter(g => g.g === grp);
    if (!grpGames.every(g => state.results[g.id])) return null; // group not finished
    const st = getGroupStandings(grp);
    return st[pos] ? st[pos].name : null;
  }
  // Best 3rd-place teams: 'T1'–'T8' — need all 12 groups done
  const tM = slot.match(/^T([1-8])$/);
  if (tM) {
    const idx = parseInt(tM[1]) - 1;
    const allDone = 'ABCDEFGHIJKL'.split('').every(g =>
      GROUP_GAMES.filter(gg => gg.g === g).every(gg => state.results[gg.id])
    );
    if (!allDone) return null;
    const best8 = getBest3rdPlaceTeams();
    return best8[idx] ? best8[idx].name : null;
  }
  // Winner of a KO game: 'W(r32-01)', 'W(sf-1)', etc.
  const wM = slot.match(/^W\(([^)]+)\)$/);
  if (wM) {
    const gid = wM[1];
    const ko = (state.knockoutGames || []).find(g => g.id === gid);
    if (!ko) return null;
    const res = state.results[ko.id];
    if (!res) return null;
    if (res.h > res.a) return ko.home;
    if (res.a > res.h) return ko.away;
    // Draw: pen result must be present AND decisive (ph !== pa)
    if (res.ph != null && res.ph !== res.pa) return res.ph > res.pa ? ko.home : ko.away;
    return null; // draw with no valid penalty result yet
  }
  // Loser of a KO game: 'L(sf-1)', 'L(sf-2)' — used for 3rd place
  const lM = slot.match(/^L\(([^)]+)\)$/);
  if (lM) {
    const gid = lM[1];
    const ko = (state.knockoutGames || []).find(g => g.id === gid);
    if (!ko) return null;
    const res = state.results[ko.id];
    if (!res) return null;
    if (res.h > res.a) return ko.away;
    if (res.a > res.h) return ko.home;
    // Draw: pen result must be present AND decisive (ph !== pa)
    if (res.ph != null && res.ph !== res.pa) return res.ph > res.pa ? ko.away : ko.home;
    return null;
  }
  return null;
}

// Create / update KO games in state.knockoutGames as bracket slots resolve.
// Called after every result save and after ESPN fetch.
function syncKOBracket() {
  if (!state.knockoutGames) state.knockoutGames = [];
  let changed = false;
  for (const tmpl of KO_BRACKET_TEMPLATE) {
    const existing = state.knockoutGames.find(g => g.id === tmpl.id);
    const home = resolveKOSlot(tmpl.homeSlot);
    const away = resolveKOSlot(tmpl.awaySlot);
    if (home && away) {
      if (!existing) {
        state.knockoutGames.push({ id: tmpl.id, round: tmpl.round, home, away, date: tmpl.date });
        // Do NOT call initSession here — pick order must be computed lazily (in renderPick)
        // once the previous session's actual scores are known. Pre-initializing here would
        // lock in a stale pick order based on zero/null previous-session scores.
        changed = true;
      } else if (existing.home !== home || existing.away !== away) {
        // Shouldn't normally happen but handles edge cases (re-entry of results)
        existing.home = home;
        existing.away = away;
        changed = true;
      }
    }
  }
  if (changed) saveState();
  return changed;
}

// ═══════════════════════════════════════════════════════════════

function resetCurrentPicks(sessionKey) {
  currentPicks = {};
  for (const game of getSessionGames(sessionKey)) {
    currentPicks[game.id] = isKnockoutGame(game.id)
      ? { h:0, a:0, ph:0, pa:0 }
      : { h:0, a:0 };
  }
}

function adjustScore(gameId, side, delta) {
  if (!currentPicks[gameId]) currentPicks[gameId] = { h:0, a:0 };
  currentPicks[gameId][side] = Math.max(0, (currentPicks[gameId][side] || 0) + delta);
  const el = document.getElementById(`sd-${side}-${gameId}`);
  if (el) el.textContent = currentPicks[gameId][side];
  clearGameError(gameId);
  updatePenSection(gameId);
}

function adjustPen(gameId, side, delta) {
  if (!currentPicks[gameId]) currentPicks[gameId] = { h:0, a:0, ph:0, pa:0 };
  currentPicks[gameId][side] = Math.max(0, (currentPicks[gameId][side] || 0) + delta);
  const el = document.getElementById(`sd-${side}-${gameId}`);
  if (el) el.textContent = currentPicks[gameId][side];
  clearGameError(gameId);
}

function updatePenSection(gameId) {
  if (!isKnockoutGame(gameId)) return;
  const penSec = document.getElementById(`pen-section-${gameId}`);
  if (!penSec) return;
  const pick = currentPicks[gameId] || {h:0, a:0};
  penSec.style.display = pick.h === pick.a ? 'block' : 'none';
}

function setGameError(gameId, msg) {
  const el = document.getElementById(`gerr-${gameId}`);
  if (el) { el.textContent = msg; el.style.display = 'block'; }
  const card = document.getElementById(`gcard-${gameId}`);
  if (card) card.classList.add('invalid');
}

function clearGameError(gameId) {
  const el = document.getElementById(`gerr-${gameId}`);
  if (el) { el.textContent = ''; el.style.display = 'none'; }
  const card = document.getElementById(`gcard-${gameId}`);
  if (card) card.classList.remove('invalid');
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════

function startGame() {
  if (state.players.length < 2) return;
  state.started = true;
  initSession(0);
  resetCurrentPicks(getActiveSessions()[0].key);
  saveState();
  setView('pick');
}

function addKnockoutGame(round, home, away, date) {
  const id = `ko-${uid()}`;
  state.knockoutGames.push({ id, round, home, away, date });
  // Init a session for this date if one doesn't exist yet
  const sessKey = `s-${date}`;
  if (!state.sessions[sessKey]) {
    // Find the index of this new session in the active list
    const active = getActiveSessions();
    const idx = active.findIndex(s => s.key === sessKey);
    if (idx >= 0) initSession(idx);
  }
  saveState();
  window.renderAdmin();
}

function addPlayer(name, photo) {
  if (!name.trim()) return;
  state.players.push({ id: uid(), name: name.trim(), photo: photo || '' });
  saveState();
  renderSetup();
}

function removePlayer(id) {
  if (state.started) return;
  state.players = state.players.filter(p => p.id !== id);
  saveState();
  renderSetup();
}

function submitPicks(sessionKey, playerId) {
  const games = getSessionGames(sessionKey);
  let valid = true;

  for (const game of games) {
    clearGameError(game.id);
    const pick = currentPicks[game.id] || { h:0, a:0 };
    const { h, a } = pick;
    const ko = isKnockoutGame(game.id);

    // KO rule: if draw, penalty scores must be set and different
    if (ko && h === a) {
      const ph = pick.ph ?? 0, pa = pick.pa ?? 0;
      if (ph === pa) {
        setGameError(game.id, 'It\'s a draw — penalty scores must differ to settle who goes through!');
        valid = false;
      }
    }
  }

  if (!valid) {
    showToast('⚠️ Fix the errors above before submitting.', 'warn');
    return;
  }

  // Save picks
  const sessData = state.sessions[sessionKey];
  sessData.picks[playerId] = {};
  for (const game of games) {
    const cp = currentPicks[game.id] || { h:0, a:0 };
    const ko = isKnockoutGame(game.id);
    // For KO draws, store penalty picks; for decisive KO results, strip ph/pa
    if (ko && cp.h === cp.a) {
      sessData.picks[playerId][game.id] = { h:cp.h, a:cp.a, ph:cp.ph??0, pa:cp.pa??0 };
    } else {
      sessData.picks[playerId][game.id] = { h:cp.h, a:cp.a };
    }
  }

  if (checkSessionComplete(sessionKey)) {
    onSessionComplete(sessionKey);
  }

  saveState();
  showToast('✓ Picks saved!', 'ok');

  // Reset and re-render pick screen
  const cur = getCurrentSession();
  if (cur) {
    resetCurrentPicks(cur.sess.key);
  }
  renderPick();
}

function saveResult(gameId, h, a, ph, pa) {
  if (h === '' || a === '' || isNaN(parseInt(h)) || isNaN(parseInt(a))) {
    delete state.results[gameId];
  } else {
    const r = { h: Math.max(0, parseInt(h)), a: Math.max(0, parseInt(a)) };
    if (ph !== undefined && pa !== undefined &&
        ph !== '' && pa !== '' &&
        !isNaN(parseInt(ph)) && !isNaN(parseInt(pa))) {
      r.ph = Math.max(0, parseInt(ph));
      r.pa = Math.max(0, parseInt(pa));
    }
    state.results[gameId] = r;
  }
  saveState();
  syncKOBracket(); // unlock any KO games whose slots are now resolved
}

function resetGame() {
  if (!confirm('Reset the entire game? This erases all picks and results.')) return;
  state = defaultState();
  currentPicks = {};
  saveState();
  setView('setup');
}

function showToast(msg, type = 'ok') {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);' +
      'z-index:999;padding:.6rem 1.25rem;border-radius:.75rem;font-size:.875rem;font-weight:600;' +
      'transition:opacity .3s;pointer-events:none;white-space:nowrap;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.background = type === 'ok' ? '#15803d' : '#b45309';
  el.style.color = '#fff';
  el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

function resizeToDataUrl(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 180;
      const scale = Math.min(MAX / img.width, MAX / img.height, 1);
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      cb(canvas.toDataURL('image/jpeg', 0.72));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function rebindAdminInputs() {
  for (const game of GROUP_GAMES) {
    const hEl = document.getElementById(`res-h-${game.id}`);
    const aEl = document.getElementById(`res-a-${game.id}`);
    if (hEl && aEl) {
      const save = () => saveResult(game.id, hEl.value, aEl.value);
      hEl.addEventListener('change', save);
      aEl.addEventListener('change', save);
    }
  }
}

function renderLeaderboard() {
  const app = document.getElementById('app');

  // Overall standings: players + bot sorted by total points
  const botStats = getBotStats();
  const allEntries = [
    ...state.players.map(p => ({
      player: p,
      isBot: false,
      ...getPlayerStats(p.id),
    })),
    { player: null, isBot: true, ...botStats },
  ];

  // Sort all entries together (humans + bot) ascending — fewest pts = best
  const displayEntries = [...allEntries]
    .sort((a, b) => a.total - b.total || a.exact - b.exact || a.correct - b.correct);

  // Assign rank numbers to humans only (bot gets null); human ties share a rank
  let rank = 0, lastPts = null, lastExact = null, humanPos = 0;
  for (const e of displayEntries) {
    if (e.isBot) { e.rank = null; continue; }
    humanPos++;
    if (e.total !== lastPts || e.exact !== lastExact) { rank = humanPos; }
    e.rank = rank;
    lastPts = e.total; lastExact = e.exact;
  }

  const rankColors = { 1:'#fcd34d', 2:'#94a3b8', 3:'#c2956b' };

  app.innerHTML = `

          font-weight:700;">SCORE</th>
      </tr>

      ${displayEntries.map(e => {
        const isBot = e.isBot;

          ? `<span style="color:#6366f1;font-size:.8rem;">—</span>`

        return `

function render() {
  updateNav();
  if (!state.started) {
    state.view = 'setup';
    renderSetup();
    return;
  }
  switch (state.view) {
    case 'setup':     renderSetup();      break;
    case 'pick':      renderPick();       break;
    case 'admin':     window.renderAdmin ? window.renderAdmin() : renderAdmin(); break;
    case 'board':     renderLeaderboard(); break;
    default:          renderPick();       break;
  }
}

function adminRemoveKO(gameId) {
  if (!confirm('Remove this knockout game? Any picks and results for it will also be deleted.')) return;
  state.knockoutGames = (state.knockoutGames||[]).filter(g => g.id !== gameId);
  delete state.results[gameId];
  // Remove picks from all sessions
  for (const sess of Object.values(state.sessions)) {
    for (const picks of Object.values(sess.picks)) {
      delete picks[gameId];
    }
  }
  saveState();
  window.renderAdmin();

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════════
// ESPN AUTO-FETCH
// ═══════════════════════════════════════════════════════════════

const ESPN_SCOREBOARD =
  'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';

// Map ESPN display names → our team names where they differ
const ESPN_TEAM_MAP = {
  'united states':                'USA',
  'us':                           'USA',
  'bosnia and herzegovina':       'Bosnia and Herz.',
  'bosnia-herzegovina':           'Bosnia and Herz.',
  'bosnia & herzegovina':         'Bosnia and Herz.',
  'czech republic':               'Czechia',
  'ivory coast':                  'Ivory Coast',
  "cote d'ivoire":                'Ivory Coast',
  'côte d\'ivoire':               'Ivory Coast',
  'korea republic':               'South Korea',
  'republic of korea':            'South Korea',
  'cabo verde':                   'Cape Verde',
  'saudi arabia':                 'Saudi Arabia',
  'new zealand':                  'New Zealand',
  'dr congo':                     'DR Congo',
  'democratic republic of congo': 'DR Congo',
  'congo dr':                     'DR Congo',
  "congo, the democratic republic of the": 'DR Congo',
  'curacao':                      'Curaçao',
};

function espnNorm(name) {
  if (!name) return '';
  return ESPN_TEAM_MAP[name.toLowerCase().trim()] || name;
}

function matchGameToESPN(espnHome, espnAway) {
  const h = espnNorm(espnHome), a = espnNorm(espnAway);
  const all = [...GROUP_GAMES, ...(state.knockoutGames || [])];
  return (
    all.find(g => g.home.toLowerCase() === h.toLowerCase() &&
                  g.away.toLowerCase() === a.toLowerCase()) ||
    all.find(g => g.home.toLowerCase() === a.toLowerCase() &&
                  g.away.toLowerCase() === h.toLowerCase())
  );
}

let _lastFetch = null;   // timestamp of last successful call
let _fetchTimer = null;  // setTimeout handle (smart scheduler)
let _fetching  = false;  // debounce flag

async function fetchESPN(showFeedback = false) {
  if (_fetching) return 0;
  _fetching = true;

  const todayStr = new Date().toISOString().split('T')[0]; // YYYY-MM-DD

  // Collect dates: today + any past game dates that still have no result
  const dates = new Set([todayStr.replace(/-/g, '')]);
  for (const g of [...GROUP_GAMES, ...(state.knockoutGames || [])]) {
    if (!state.results[g.id] && g.date && g.date <= todayStr) {
      dates.add(g.date.replace(/-/g, ''));
    }
  }

  let updated = 0;

  for (const dateStr of dates) {
    try {
      const resp = await fetch(`${ESPN_SCOREBOARD}?dates=${dateStr}`,
        { signal: AbortSignal.timeout(8000) });
      if (!resp.ok) continue;
      const data = await resp.json();

      for (const ev of (data.events || [])) {
        const comp = ev.competitions?.[0];
        if (!comp?.status?.type?.completed) continue;

        const hc = comp.competitors?.find(c => c.homeAway === 'home');
        const ac = comp.competitors?.find(c => c.homeAway === 'away');
        if (!hc || !ac) continue;

        const scoreH = parseInt(hc.score), scoreA = parseInt(ac.score);
        if (isNaN(scoreH) || isNaN(scoreA)) continue;

        const game = matchGameToESPN(
          hc.team?.displayName || hc.team?.name || '',
          ac.team?.displayName || ac.team?.name || ''
        );
        if (!game) continue;

        const cur = state.results[game.id];
        const newRes = { h: scoreH, a: scoreA };

        // Preserve manually-entered penalties if 90-min score is unchanged
        if (cur && cur.h === scoreH && cur.a === scoreA && cur.ph != null) {
          newRes.ph = cur.ph; newRes.pa = cur.pa;
        }

        // Try to parse penalty result from ESPN notes (e.g. "Brazil wins 4-3 on penalties")
        if (scoreH === scoreA) {
          for (const note of (comp.notes || [])) {
            const txt = note.headline || note.text || '';
            const m = txt.match(/(\S[\w\s]*?)\s+wins\s+(\d+)[–\-](\d+)\s+on\s+pen/i);
            if (m) {
              const winner = espnNorm(m[1].trim());
              const pA = parseInt(m[2]), pB = parseInt(m[3]);
              const winHome = game.home.toLowerCase() === winner.toLowerCase();
              newRes.ph = winHome ? pA : pB;
              newRes.pa = winHome ? pB : pA;
              break;
            }
          }
        }

        // Only update if something changed
        if (!cur || cur.h !== newRes.h || cur.a !== newRes.a ||
            cur.ph !== newRes.ph || cur.pa !== newRes.pa) {
          state.results[game.id] = newRes;
          updated++;
        }
      }
    } catch (e) {
      console.warn('ESPN fetch error:', e.message);
    }
  }

  _lastFetch = Date.now();
  _fetching = false;

  if (updated > 0) {
    syncKOBracket(); // unlock any new KO games
    saveState();
    if (showFeedback) showToast(`✓ ${updated} result${updated !== 1 ? 's' : ''} updated from ESPN`, 'ok');
    // Don't re-render admin (would wipe in-progress manual inputs); re-render everything else
    if (state.view !== 'admin') render();
  } else if (showFeedback) {
    showToast('ESPN: no new completed results found', 'ok');
  }

  // Refresh the status chip in the admin panel if it's open
  const chip = document.getElementById('espn-status');
  if (chip) chip.textContent = `Last checked: ${new Date(_lastFetch).toLocaleTimeString()}`;

  scheduleNextFetch(); // self-schedule based on pending games
  return updated;
}

// Smart scheduler: polls often when games are active, idle otherwise.
// Uses setTimeout (not setInterval) so each cycle re-evaluates pending state.
function scheduleNextFetch() {
  if (_fetchTimer) clearTimeout(_fetchTimer);
  _fetchTimer = null;

  const todayStr     = new Date().toISOString().split('T')[0];
  const yesterdayStr = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  const allGames     = [...GROUP_GAMES, ...(state.knockoutGames || [])];

  const pendingToday     = allGames.some(g => g.date === todayStr     && !state.results[g.id]);
  const pendingYesterday = allGames.some(g => g.date === yesterdayStr && !state.results[g.id]);

  if (pendingToday) {
    // Active game day — poll every 2 min (buffer for ET + pen shootout)
    _fetchTimer = setTimeout(() => fetchESPN(false), 2 * 60 * 1000);
  } else if (pendingYesterday) {
    // Games from yesterday still outstanding (very late finishers) — check every 5 min
    _fetchTimer = setTimeout(() => fetchESPN(false), 5 * 60 * 1000);
  }
  // No nearby pending games → startup fetch only, no background polling
}

function startAutoFetch() {
  fetchESPN(false); // immediate on startup; scheduleNextFetch() called at end of fetchESPN
}

function init() {
  // If game is started and we have a current session, init currentPicks
  if (state.started) {
    syncKOBracket(); // resolve any bracket slots that have results
    const cur = getCurrentSession();
    if (cur) {
      const picker = getCurrentPicker(cur.sess.key);
      if (picker) {
        resetCurrentPicks(cur.sess.key);
        window._lastPickingKey = `${cur.sess.key}::${picker.id}`;
      }
    }
    startAutoFetch(); // kick off background result polling
  }
  // Default view
  if (!state.view) state.view = state.started ? 'pick' : 'setup';
  render();
}

init();
</script>
