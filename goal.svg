<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none">
  <defs>
    <clipPath id="back-clip">
      <polygon points="48,6 148,6 148,96 48,96"/>
    </clipPath>
  </defs>

  <!-- Face fills for depth -->
  <polygon fill="#e2e8f0" points="48,6 148,6 148,96 48,96"/>
  <polygon fill="#d4dce8" points="12,18 112,18 148,6 48,6"/>
  <polygon fill="#cbd5e0" points="112,18 148,6 148,96 112,108"/>

  <!-- Net grid on back wall -->
  <g clip-path="url(#back-clip)" stroke="#a0aec0" stroke-width="0.8">
    <line x1="60" y1="6" x2="60" y2="96"/>
    <line x1="72" y1="6" x2="72" y2="96"/>
    <line x1="84" y1="6" x2="84" y2="96"/>
    <line x1="96" y1="6" x2="96" y2="96"/>
    <line x1="108" y1="6" x2="108" y2="96"/>
    <line x1="120" y1="6" x2="120" y2="96"/>
    <line x1="132" y1="6" x2="132" y2="96"/>
    <line x1="144" y1="6" x2="144" y2="96"/>
    <line x1="48" y1="18" x2="148" y2="18"/>
    <line x1="48" y1="30" x2="148" y2="30"/>
    <line x1="48" y1="42" x2="148" y2="42"/>
    <line x1="48" y1="54" x2="148" y2="54"/>
    <line x1="48" y1="66" x2="148" y2="66"/>
    <line x1="48" y1="78" x2="148" y2="78"/>
    <line x1="48" y1="90" x2="148" y2="90"/>
  </g>

  <!-- Back frame -->
  <g stroke="#4a5568" stroke-width="2.5" stroke-linecap="round">
    <line x1="48" y1="6" x2="148" y2="6"/>
    <line x1="48" y1="6" x2="48" y2="96"/>
    <line x1="148" y1="6" x2="148" y2="96"/>
    <line x1="48" y1="96" x2="148" y2="96"/>
  </g>

  <!-- Depth connectors (front → back) -->
  <g stroke="#4a5568" stroke-width="2.5" stroke-linecap="round">
    <line x1="12" y1="18" x2="48" y2="6"/>
    <line x1="112" y1="18" x2="148" y2="6"/>
    <line x1="112" y1="108" x2="148" y2="96"/>
  </g>

  <!-- Front frame — boldest, on top -->
  <g stroke="#1a202c" stroke-width="4.5" stroke-linecap="round">
    <line x1="12" y1="18" x2="12" y2="108"/>
    <line x1="112" y1="18" x2="112" y2="108"/>
    <line x1="12" y1="18" x2="112" y2="18"/>
  </g>
</svg>